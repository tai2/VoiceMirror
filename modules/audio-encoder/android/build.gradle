plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.audioencoder'
version = '1.0.0'

android {
  namespace "expo.modules.audioencoder"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }

  compileOptions {
    targetCompatibility JavaVersion.VERSION_1_8
  }
}
